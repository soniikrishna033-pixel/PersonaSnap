
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
<style>
#hero{position:relative;width:100%;height:580px;overflow:hidden;font-family:'Inter',system-ui,sans-serif;}
#c{position:absolute;top:0;left:0;width:100%;height:100%;}
.hero-body{position:relative;z-index:5;display:flex;flex-direction:column;justify-content:center;height:580px;padding:0 7%;max-width:700px;}
.eyebrow{display:flex;align-items:center;gap:8px;margin-bottom:22px;}
.dot{width:7px;height:7px;border-radius:50%;background:#a78bfa;animation:pdot 2.2s ease-in-out infinite;}
.eyebrow span{color:#a78bfa;font-size:11.5px;letter-spacing:.15em;text-transform:uppercase;font-weight:600;}
h1{color:#f8fafc;font-size:clamp(2rem,4.8vw,3.8rem);font-weight:800;line-height:1.07;margin:0 0 20px;letter-spacing:-.025em;}
h1 em{font-style:normal;color:#a78bfa;}
.sub{color:#94a3b8;font-size:1rem;line-height:1.78;margin:0 0 34px;max-width:430px;}
.btns{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:48px;}
.btn-p{background:#7c3aed;color:#fff;border:none;padding:13px 28px;border-radius:10px;font-size:.93rem;font-weight:600;cursor:pointer;font-family:inherit;transition:transform .14s,box-shadow .14s;}
.btn-p:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(124,58,237,.55);}
.btn-g{background:rgba(124,58,237,.09);color:#a78bfa;border:1px solid rgba(124,58,237,.38);padding:13px 28px;border-radius:10px;font-size:.93rem;cursor:pointer;font-family:inherit;transition:background .14s,transform .14s;}
.btn-g:hover{background:rgba(124,58,237,.2);transform:translateY(-2px);}
.stats{display:flex;align-items:center;}
.stat{padding-right:26px;}
.stat-n{color:#f8fafc;font-size:1.7rem;font-weight:700;letter-spacing:-.02em;}
.stat-l{color:#475569;font-size:.69rem;text-transform:uppercase;letter-spacing:.1em;margin-top:3px;}
.sdiv{width:1px;height:30px;background:rgba(124,58,237,.28);margin-right:26px;}
@keyframes pdot{0%,100%{opacity:.45;transform:scale(1);}50%{opacity:1;transform:scale(1.6);}}
</style>

<div id="hero">
  <canvas id="c"></canvas>
  <div class="hero-body">
    <div class="eyebrow">
      <div class="dot"></div>
      <span>Personality &amp; growth quizzes</span>
    </div>
    <h1>Discover Yourself.<br><em>Grow Every Day.</em></h1>
    <p class="sub">Take powerful personality quizzes. Uncover your hidden traits and strengths. Share your results with the world.</p>
    <div class="btns">
      <button class="btn-p">Start Exploring</button>
      <button class="btn-g">View All Tests</button>
    </div>
    <div class="stats">
      <div class="stat"><div class="stat-n">2M+</div><div class="stat-l">Users</div></div>
      <div class="sdiv"></div>
      <div class="stat"><div class="stat-n">50+</div><div class="stat-l">Unique Tests</div></div>
      <div class="sdiv"></div>
      <div class="stat"><div class="stat-n">98%</div><div class="stat-l">Satisfaction</div></div>
    </div>
  </div>
</div>

<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let W,H,ps=[],mouse={x:null,y:null},tick=0,ripples=[],sparks=[];

const ORBS=[
  {fx:.76,fy:.2,r:.38,rgb:[109,40,217],spd:.00021,ph:0},
  {fx:.88,fy:.78,r:.27,rgb:[219,39,119],spd:.00027,ph:2.3},
  {fx:.1,fy:.72,r:.22,rgb:[37,99,235],spd:.00033,ph:4.5},
  {fx:.55,fy:.02,r:.18,rgb:[139,92,246],spd:.00042,ph:1.3},
  {fx:.95,fy:.42,r:.14,rgb:[168,85,247],spd:.00038,ph:3.1},
];

class P{
  constructor(){
    this.x=Math.random()*W;this.y=Math.random()*H;
    this.vx=(Math.random()-.5)*.3;this.vy=(Math.random()-.5)*.3;
    this.sz=Math.random()*1.5+.5;
    this.ph=Math.random()*Math.PI*2;
    this.ps=.003+Math.random()*.004;
    this.base=.3+Math.random()*.55;
    this.hue=248+Math.random()*60;
    this.trail=[];
  }
  update(){
    this.ph+=this.ps;
    this.vx+=Math.sin(this.ph*.4)*.017;
    this.vy+=Math.cos(this.ph*.36)*.017;
    const spd=Math.hypot(this.vx,this.vy);
    if(spd>.82){const s=.82/spd;this.vx*=s;this.vy*=s;}
    if(mouse.x!==null){
      const dx=this.x-mouse.x,dy=this.y-mouse.y;
      const d2=dx*dx+dy*dy;
      if(d2<22500){const d=Math.sqrt(d2),f=(150-d)/150*.7;this.vx+=dx/d*f;this.vy+=dy/d*f;}
    }
    this.trail.push({x:this.x,y:this.y});
    if(this.trail.length>5)this.trail.shift();
    this.x+=this.vx;this.y+=this.vy;
    if(this.x<-15)this.x=W+15;if(this.x>W+15)this.x=-15;
    if(this.y<-15)this.y=H+15;if(this.y>H+15)this.y=-15;
  }
  draw(){
    const a=this.base*(.62+.38*Math.sin(this.ph));
    if(this.trail.length>1){
      for(let i=1;i<this.trail.length;i++){
        const ta=a*(i/this.trail.length)*.26;
        ctx.beginPath();
        ctx.moveTo(this.trail[i-1].x,this.trail[i-1].y);
        ctx.lineTo(this.trail[i].x,this.trail[i].y);
        ctx.strokeStyle=`hsla(${this.hue},75%,78%,${ta})`;
        ctx.lineWidth=this.sz*.5;ctx.stroke();
      }
    }
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.sz,0,Math.PI*2);
    ctx.fillStyle=`hsla(${this.hue},78%,88%,${a})`;ctx.fill();
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.sz*4.5,0,Math.PI*2);
    ctx.fillStyle=`hsla(${this.hue},78%,78%,${a*.11})`;ctx.fill();
  }
}

function setup(){
  W=canvas.width=canvas.offsetWidth;
  H=canvas.height=canvas.offsetHeight;
  if(!ps.length)ps=Array.from({length:165},()=>new P());
}

function drawBg(){ctx.fillStyle='#030311';ctx.fillRect(0,0,W,H);}

function drawOrbs(){
  ORBS.forEach(o=>{
    const cx=(o.fx+Math.sin(tick*o.spd+o.ph)*.13)*W;
    const cy=(o.fy+Math.cos(tick*o.spd*.83+o.ph)*.1)*H;
    const rad=o.r*Math.min(W,H);
    const pulse=.16+.055*Math.sin(tick*o.spd*5+o.ph);
    const g=ctx.createRadialGradient(cx,cy,0,cx,cy,rad);
    const[r,gn,b]=o.rgb;
    g.addColorStop(0,`rgba(${r},${gn},${b},${pulse})`);
    g.addColorStop(.43,`rgba(${r},${gn},${b},${pulse*.38})`);
    g.addColorStop(1,`rgba(${r},${gn},${b},0)`);
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  });
}

function drawEdges(){
  const D=110,D2=D*D;
  for(let i=0;i<ps.length;i++){
    for(let j=i+1;j<ps.length;j++){
      const dx=ps[i].x-ps[j].x,dy=ps[i].y-ps[j].y,d2=dx*dx+dy*dy;
      if(d2<D2){
        const d=Math.sqrt(d2),a=(1-d/D)*.22;
        ctx.beginPath();ctx.moveTo(ps[i].x,ps[i].y);ctx.lineTo(ps[j].x,ps[j].y);
        ctx.strokeStyle=`rgba(167,139,250,${a})`;ctx.lineWidth=.55;ctx.stroke();
      }
    }
  }
}

function drawRipples(){
  ripples=ripples.filter(r=>r.a>.01);
  ripples.forEach(r=>{
    r.rad+=3.8;r.a*=.93;
    for(let i=0;i<3;i++){
      ctx.beginPath();ctx.arc(r.x,r.y,r.rad+i*18,0,Math.PI*2);
      ctx.strokeStyle=`rgba(167,139,250,${r.a*(1-i*.32)})`;
      ctx.lineWidth=.85;ctx.stroke();
    }
  });
}

function drawSparks(){
  sparks=sparks.filter(s=>s.a>.02);
  sparks.forEach(s=>{
    s.r+=1.9;s.a*=.91;
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.strokeStyle=`rgba(196,167,255,${s.a})`;ctx.lineWidth=.7;ctx.stroke();
  });
  if(Math.random()<.007){
    const p=ps[Math.floor(Math.random()*ps.length)];
    sparks.push({x:p.x,y:p.y,r:0,a:.8});
  }
}

function frame(){
  tick++;drawBg();drawOrbs();drawEdges();
  ps.forEach(p=>{p.update();p.draw();});
  drawRipples();drawSparks();
  requestAnimationFrame(frame);
}

canvas.addEventListener('mousemove',e=>{
  const r=canvas.getBoundingClientRect();
  mouse.x=e.clientX-r.left;mouse.y=e.clientY-r.top;
});
canvas.addEventListener('mouseleave',()=>{mouse.x=null;mouse.y=null;});
canvas.addEventListener('click',e=>{
  const r=canvas.getBoundingClientRect();
  const x=e.clientX-r.left,y=e.clientY-r.top;
  for(let i=0;i<5;i++)ripples.push({x,y,rad:i*4,a:.72-i*.1});
});
window.addEventListener('resize',()=>{
  W=canvas.width=canvas.offsetWidth;
  H=canvas.height=canvas.offsetHeight;
});

setup();frame();
</script>
